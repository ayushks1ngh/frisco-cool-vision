services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: frisco_cool
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/frisco_cool
      JWT_SECRET: docker-dev-secret-change-in-production
      ADMIN_EMAIL: admin@friscocooling.com
      ADMIN_PASSWORD: ChangeMe123!
      CORS_ORIGIN: http://localhost
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: .
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
